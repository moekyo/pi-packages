packages:
  - "packages/*"

# pi-subagents-* extension packages consume their siblings from the npm registry
# (the published tarball ships the bundled dist/public.d.ts), not via workspace
# symlinks — a symlinked sibling would resolve exports.types to the gitignored,
# unbuilt dist on a fresh checkout. Cross-package links must opt in explicitly
# with the workspace: protocol.
linkWorkspacePackages: false

# Centralize version management across all packages.
# In each package.json, use "catalog:" as the version specifier
# to pull from here (e.g. "vitest": "catalog:").
catalog:
  "@biomejs/biome": "^2.4.14"
  "eslint": "^10.4.0"
  "globals": "^17.5.0"
  "typescript-eslint": "^8.58.1"
  "rumdl": "^0.1.93"
  "typescript": "^6.0.3"
  "vitest": "^4.1.5"
  "@types/node": "^22.15.3"
  fallow: "^2.91.0"

allowBuilds:
  "@google/genai": true
  fallow: true
  koffi: true
  protobufjs: true
  tree-sitter-bash: true

minimumReleaseAgeExclude:
  - '@fallow-cli/darwin-arm64@2.91.0'
  - '@fallow-cli/darwin-x64@2.91.0'
  - '@fallow-cli/linux-arm64-gnu@2.91.0'
  - '@fallow-cli/linux-arm64-musl@2.91.0'
  - '@fallow-cli/linux-x64-gnu@2.91.0'
  - '@fallow-cli/linux-x64-musl@2.91.0'
  - '@fallow-cli/win32-arm64-msvc@2.91.0'
  - '@fallow-cli/win32-x64-msvc@2.91.0'
  - fallow@2.91.0
