packages:
  - "packages/*"

# Centralize version management across all packages.
# In each package.json, use "catalog:" as the version specifier
# to pull from here (e.g. "vitest": "catalog:").
catalog:
  "@biomejs/biome": "^2.4.14"
  "markdownlint-cli2": "^0.22.1"
  "typescript": "^6.0.3"
  "vitest": "^4.1.5"
  "@types/node": "^25.6.2"

allowBuilds:
  "@google/genai": true
  koffi: true
  protobufjs: true
  tree-sitter-bash: true
